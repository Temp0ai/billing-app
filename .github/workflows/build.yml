name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Sign APK
      run: |
        # Create a debug keystore
        keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        
        # Find apksigner
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | head -1)
        ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | head -1)
        
        # Zipalign first
        $ZIPALIGN -f 4 app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/app-debug-aligned.apk
        
        # Sign with apksigner
        $APKSIGNER sign --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out app/build/outputs/apk/debug/app-signed.apk app/build/outputs/apk/debug/app-debug-aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: billing-app-debug
        path: app/build/outputs/apk/debug/app-signed.apk
