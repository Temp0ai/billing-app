name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleRelease assembleDebug --no-daemon

    - name: Sign APK
      run: |
        keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | tail -1)
        ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | tail -1)
        
        $ZIPALIGN -f 4 app/build/outputs/apk/debug/app-debug.apk aligned.apk
        $APKSIGNER sign --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --v1-signing-enabled true --v2-signing-enabled true --out app/build/outputs/apk/debug/app-debug.apk aligned.apk
        
        cp app/build/outputs/apk/debug/app-debug.apk billing-app.apk

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: billing-app-debug
        path: billing-app.apk

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: billing-app.apk
        prerelease: true
