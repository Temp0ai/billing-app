name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create release keystore
      run: |
        mkdir -p $HOME/.android
        keytool -genkeypair -v \
          -keystore $HOME/.android/release.keystore \
          -alias billingapp \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass billing123 -keypass billing123 \
          -dname "CN=BillingApp,OU=Development,O=BillingApp,L=Unknown,ST=Unknown,C=IN"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Post-process APK
      run: |
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | tail -1)
        ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | tail -1)

        cp app/build/outputs/apk/release/app-release.apk /tmp/work.apk

        # Remove files that confuse Samsung's installer
        cd /tmp
        zip -d work.apk "META-INF/com/android/build/gradle/app-metadata.properties" || true
        zip -d work.apk "assets/dexopt/*" || true

        # Re-zipalign
        $ZIPALIGN -f 4 /tmp/work.apk /tmp/aligned.apk

        # Re-sign after removing files
        $APKSIGNER sign \
          --ks $HOME/.android/release.keystore \
          --ks-key-alias billingapp \
          --ks-pass pass:billing123 \
          --key-pass pass:billing123 \
          --v1-signing-enabled true \
          --v2-signing-enabled true \
          --v3-signing-enabled true \
          --out $GITHUB_WORKSPACE/billing-app.apk \
          /tmp/aligned.apk

    - name: Verify signing
      run: |
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | tail -1)
        $APKSIGNER verify --print-certs billing-app.apk

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: billing-app-release
        path: billing-app.apk

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: billing-app.apk
        prerelease: true
